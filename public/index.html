<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tools — sajivfrancis.com</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: #0d0d0d; color: #e2e2e2;
      min-height: 100vh; padding: 48px 20px; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 560px; margin: 0 auto; }
    .site-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px;
      color: #6b6b6b; margin-bottom: 6px; }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 32px;
      color: #e2e2e2; }
    h1 span { color: #a78bfa; }
    .tool-card { display: block; padding: 16px 18px; background: #161616;
      border: 1px solid #2c2c2c; border-radius: 12px; color: #e2e2e2;
      text-decoration: none; margin-bottom: 10px; transition: border-color 0.2s; }
    .tool-card:hover { border-color: #a78bfa; }
    .tool-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .tool-desc { font-size: 13px; color: #6b6b6b; }
    .tool-tag { display: inline-block; font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; background: rgba(167,139,250,0.1); color: #a78bfa;
      border: 1px solid rgba(167,139,250,0.2); border-radius: 4px;
      padding: 1px 6px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="site-label">sajivfrancis.com</div>
    <h1>Personal <span>Tools</span></h1>

    <a class="tool-card" href="/pdf-compressor.html">
      <div class="tool-name">PDF Compressor</div>
      <div class="tool-desc">Batch-compress PDFs to under 25 MB for RAG pipeline upload. Runs entirely in your browser — nothing leaves your device.</div>
      <span class="tool-tag">browser-only</span>
    </a>

    <!-- Add future tools here -->
  </div>
</body>
</html>
